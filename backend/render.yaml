services:
  - type: web
    name: hire-me-backend
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_DIALECT
        value: sqlite
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src
      sizeGB: 1
