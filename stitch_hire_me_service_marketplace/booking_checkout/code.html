<!-- Mock Background Content (Simulating a Provider Page) -->

</div>
</div>

<!-- Modal Header -->

<button aria-label="Close modal" class="p-base hover:bg-surface-container transition-colors rounded-full">

</header>
<!-- Modal Content (Form) -->
<div class="px-xl py-xl space-y-lg overflow-y-auto max-h-[819px]">
<!-- Date Picker Section -->
<div class="space-y-xs">
<label class="text-label-md font-label-md text-on-surface-variant block">Select Date</label>
<div class="relative">
<input class="w-full h-12 bg-surface-bright border border-outline rounded-lg px-md focus:ring-2 focus:ring-primary focus:border-primary outline-none text-body-md font-body-md" type="date" value="2024-11-20"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-on-surface-variant pointer-events-none">calendar_today</span>
</div>
</div>
<!-- Time Slot Pills -->
<div class="space-y-xs">
<label class="text-label-md font-label-md text-on-surface-variant block">Available Time Slots</label>
<div class="flex flex-wrap gap-sm">
<button class="px-md py-sm border border-outline rounded-full text-label-md font-label-md hover:border-primary hover:text-primary transition-all duration-200">9AM</button>
<button class="px-md py-sm border border-primary bg-primary text-on-primary rounded-full text-label-md font-label-md shadow-sm">1PM</button>

<button class="px-md py-sm border border-outline rounded-full text-label-md font-label-md opacity-40 cursor-not-allowed">7PM</button>
</div>
</div>
<!-- Task Description -->
<div class="space-y-xs">
<label class="text-label-md font-label-md text-on-surface-variant block" for="task-desc">Detailed Task Description</label>
<textarea class="w-full bg-surface-bright border border-outline rounded-lg p-md focus:ring-2 focus:ring-primary focus:border-primary outline-none text-body-md font-body-md resize-none" id="task-desc" placeholder="Please describe the specific work needed, any tools required, and entry instructions..." rows="4"></textarea>
</div>

<script>
        // Simple Interaction Logic
        document.querySelectorAll('.flex.flex-wrap.gap-sm button').forEach(button => {
            if (!button.classList.contains('cursor-not-allowed')) {
                button.addEventListener('click', () => {
                    document.querySelectorAll('.flex.flex-wrap.gap-sm button').forEach(b => {
                        b.classList.remove('bg-primary', 'text-on-primary', 'border-primary', 'shadow-sm');
                        b.classList.add('border-outline', 'text-on-surface-variant');
                    });
                    button.classList.add('bg-primary', 'text-on-primary', 'border-primary', 'shadow-sm');
                    button.classList.remove('border-outline', 'text-on-surface-variant');
                });
            }
        });

        // Close on ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                // Logic to close modal would go here
                console.log('Close Modal Requested');
            }
        });
    </script>
